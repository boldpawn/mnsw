spring:
  application:
    name: mnsw
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/mnsw}
    username: ${DB_USER:mnsw}
    password: ${DB_PASSWORD:mnsw}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  pulsar:
    client:
      service-url: ${PULSAR_URL:pulsar://localhost:6650}
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

security:
  jwt:
    secret: ${JWT_SECRET:changeme-in-production-use-256-bit-secret}
    expiration-hours: 8

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false
