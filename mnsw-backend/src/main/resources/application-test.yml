# Testcontainers-compatible configuratie
# De datasource URL wordt overschreven door @DynamicPropertySource in tests
# Flyway draait automatisch tegen de Testcontainers PostgreSQL instance
spring:
  datasource:
    url: jdbc:tc:postgresql:16:///mnsw?TC_INITSCRIPT=noop
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    username: test
    password: test
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  pulsar:
    client:
      service-url: pulsar://localhost:6650
    # Pulsar wordt gemocked in tests — geen echte Pulsar container vereist

security:
  jwt:
    secret: test-secret-key-for-testing-only-256bits-long-enough
    expiration-hours: 1

springdoc:
  swagger-ui:
    enabled: true
